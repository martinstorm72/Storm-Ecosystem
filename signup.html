<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm | Register</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #020305;
            --bg2: #050810;
            --card: #080c14;
            --card2: #0c1220;
            --border: #131d30;
            --border2: #1c2a42;
            --accent: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: #f0f4ff;
            --text2: #7a90b8;
            --text3: #2d3f60;
            --grad: linear-gradient(135deg, var(--accent), var(--purple));
            --head: 'Orbitron', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --body: 'Rajdhani', sans-serif
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            cursor: none;
            padding: 80px 20px 60px
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: .3;
            pointer-events: none;
            z-index: 9998
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, .04) 3px, rgba(0, 0, 0, .04) 4px);
            pointer-events: none;
            z-index: 9997
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen
        }

        #cursor-ring {
            position: fixed;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(59, 130, 246, .4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%)
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(59, 130, 246, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, .03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 25s linear infinite;
            pointer-events: none;
            z-index: 0
        }

        @keyframes gridDrift {
            0% {
                background-position: 0 0
            }

            100% {
                background-position: 60px 60px
            }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, .06);
            top: -200px;
            right: -100px
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, .05);
            bottom: -150px;
            left: -100px
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(2, 3, 5, .8);
            backdrop-filter: blur(16px);
            z-index: 100
        }

        .logo {
            font-family: var(--head);
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: .12em;
            color: var(--text);
            text-decoration: none
        }

        .logo span {
            color: var(--accent)
        }

        .topbar-link {
            font-family: var(--mono);
            font-size: .62rem;
            color: var(--text3);
            text-decoration: none;
            letter-spacing: .1em;
            transition: color .2s
        }

        .topbar-link:hover {
            color: var(--accent)
        }

        .auth-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            animation: cardIn .6s cubic-bezier(.34, 1.56, .64, 1) both
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.96)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .card-topline {
            height: 2px;
            background: var(--grad)
        }

        .card-body {
            padding: 36px
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: rgba(99, 102, 241, .1);
            border: 1px solid rgba(99, 102, 241, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin: 0 auto 20px
        }

        .card-title {
            font-family: var(--head);
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-align: center;
            margin-bottom: 6px
        }

        .card-sub {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--text3);
            letter-spacing: .1em;
            text-align: center;
            margin-bottom: 28px
        }

        .form-group {
            margin-bottom: 16px
        }

        .form-label {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--text3);
            letter-spacing: .12em;
            display: block;
            margin-bottom: 6px
        }

        .input-wrap {
            position: relative
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            font-size: .85rem;
            pointer-events: none;
            transition: color .2s;
            z-index: 1
        }

        input[type=email],
        input[type=password],
        input[type=text] {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text);
            font-family: var(--mono);
            font-size: .75rem;
            padding: 11px 12px 11px 36px;
            outline: none;
            transition: all .2s;
            letter-spacing: .04em
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(59, 130, 246, .05);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .08)
        }

        input::placeholder {
            color: var(--text3)
        }

        .form-group:focus-within .input-icon {
            color: var(--accent)
        }

        .pwd-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: .8rem;
            padding: 4px
        }

        /* STRENGTH */
        .str-bars {
            display: flex;
            gap: 3px;
            margin-top: 8px
        }

        .str-bar {
            flex: 1;
            height: 2px;
            background: var(--border2);
            border-radius: 1px;
            transition: background .3s
        }

        .str-bar.weak {
            background: var(--red)
        }

        .str-bar.fair {
            background: var(--amber)
        }

        .str-bar.strong {
            background: var(--green)
        }

        .str-label {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--text3);
            margin-top: 4px;
            text-align: right;
            height: 16px;
            letter-spacing: .08em
        }

        .req-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 6px
        }

        .req {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: .04em
        }

        .req-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border2);
            flex-shrink: 0;
            transition: all .2s
        }

        .req.met {
            color: var(--green)
        }

        .req.met .req-dot {
            background: var(--green);
            box-shadow: 0 0 4px var(--green)
        }

        /* TERMS */
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            margin: 14px 0
        }

        .terms-row input[type=checkbox] {
            width: 14px;
            height: 14px;
            margin-top: 2px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0
        }

        .terms-row label {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--text3);
            line-height: 1.5;
            cursor: pointer;
            letter-spacing: .04em
        }

        .terms-row a {
            color: var(--accent);
            text-decoration: none
        }

        .msg {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .06em;
            padding: 10px 14px;
            border-radius: 5px;
            margin-bottom: 16px;
            display: none;
            line-height: 1.6
        }

        .msg.error {
            display: block;
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .2);
            color: #fca5a5
        }

        .msg.success {
            display: block;
            background: rgba(16, 185, 129, .08);
            border: 1px solid rgba(16, 185, 129, .2);
            color: #6ee7b7
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--grad);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-family: var(--head);
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .12em;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            overflow: hidden;
            margin-top: 4px
        }

        .btn-submit:hover {
            opacity: .9;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, .25)
        }

        .btn-submit:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }

        .btn-submit.loading {
            color: transparent
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg)
            }
        }

        .auth-footer {
            text-align: center;
            font-family: var(--mono);
            font-size: .62rem;
            color: var(--text3);
            letter-spacing: .08em;
            margin-top: 20px
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(2, 3, 5, .9);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            z-index: 10;
            backdrop-filter: blur(10px)
        }

        .status-item {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--text3);
            letter-spacing: .1em;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="topbar">
        <a href="index.html" class="logo">STORM<span>_</span></a>
        <a href="login.html" class="topbar-link">ALREADY REGISTERED? LOGIN →</a>
    </div>

    <div class="auth-card">
        <div class="card-topline"></div>
        <div class="card-body">
            <div class="card-icon">🚀</div>
            <div class="card-title">CREATE OPERATOR ACCOUNT</div>
            <div class="card-sub">JOIN 2,400+ OPERATORS LOCKING IN DAILY</div>

            <div class="msg" id="msg"></div>

            <div class="form-group">
                <label class="form-label">FULL_NAME</label>
                <div class="input-wrap"><span class="input-icon">◈</span><input type="text" id="name"
                        placeholder="Your name" autocomplete="name" /></div>
            </div>
            <div class="form-group">
                <label class="form-label">EMAIL_ADDRESS</label>
                <div class="input-wrap"><span class="input-icon">@</span><input type="email" id="email"
                        placeholder="operator@email.com" autocomplete="email" /></div>
            </div>
            <div class="form-group">
                <label class="form-label">ACCESS_KEY</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"
                        oninput="checkStrength()" />
                    <button class="pwd-toggle" type="button" onclick="togglePwd('password',this)">👁</button>
                </div>
                <div class="str-bars">
                    <div class="str-bar" id="s1"></div>
                    <div class="str-bar" id="s2"></div>
                    <div class="str-bar" id="s3"></div>
                    <div class="str-bar" id="s4"></div>
                </div>
                <div class="str-label" id="s-lbl"></div>
                <div class="req-list">
                    <div class="req" id="req-len">
                        <div class="req-dot"></div>8+ characters
                    </div>
                    <div class="req" id="req-upper">
                        <div class="req-dot"></div>Uppercase letter
                    </div>
                    <div class="req" id="req-num">
                        <div class="req-dot"></div>Number
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">CONFIRM_ACCESS_KEY</label>
                <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="confirm"
                        placeholder="Repeat password" autocomplete="new-password" /><button class="pwd-toggle"
                        type="button" onclick="togglePwd('confirm',this)">👁</button></div>
            </div>
            <div class="terms-row">
                <input type="checkbox" id="terms" />
                <label for="terms">I agree to the <a href="policy.html#terms">Terms of Service</a> and <a
                        href="policy.html">Privacy Policy</a>. Payment required to unlock the dashboard.</label>
            </div>
            <button class="btn-submit" id="signup-btn" onclick="handleSignup()">CREATE ACCOUNT & PAY →</button>
            <div class="auth-footer"><a href="login.html">← BACK TO LOGIN</a> &nbsp;|&nbsp; <a
                    href="index.html">HOME</a></div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot"></div>REGISTRATION PORTAL
        </div>
        <div class="status-item" id="sb-status">SUPABASE: CONNECTING...</div>
        <div class="status-item" id="paddle-status">PADDLE: LOADING...</div>
        <div class="status-item" style="margin-left:auto" id="sb-clock"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        // ===== SUPABASE CONFIGURATION =====
        const SUPA_URL = 'https://mryishzprrgpxauoccmr.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWlzaHpwcnJncHhhdW9jY21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTI5MTEsImV4cCI6MjA4OTY4ODkxMX0.i1-354vLtuvNWorGMYFXhqb8C-1DOlGjavAzOnli5UQ';
        const PADDLE_PRICE_ID = 'pri_01km9k8z59mvjdvny2fwcn109q';

        const { createClient } = supabase;
        const sb = createClient(SUPA_URL, SUPA_KEY);

        // ===== HELPER FUNCTIONS =====
        let paddleCheckoutOpened = false;

        async function getCurrentUser() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                return session?.user || null;
            } catch (e) {
                console.warn('getCurrentUser failed:', e);
                return null;
            }
        }

        async function checkPaidStatus(userId) {
            try {
                const { data, error } = await sb
                    .from('profiles')
                    .select('is_paid, subscription_status')
                    .eq('id', userId)
                    .single();

                if (error) {
                    console.warn('Profile fetch error:', error);
                    return false;
                }
                return data && (data.is_paid === true || data.subscription_status === 'active');
            } catch (e) {
                console.warn('checkPaidStatus failed:', e);
                return false;
            }
        }

        async function redirectIfAuthenticated() {
            const user = await getCurrentUser();
            if (user) {
                const hasPaid = await checkPaidStatus(user.id);
                if (hasPaid) {
                    window.location.href = 'dashboard.html';
                }
            }
        }

        async function updateUserProfile(userId, email, fullName) {
            try {
                const { error } = await sb
                    .from('profiles')
                    .upsert({
                        id: userId,
                        email: email,
                        full_name: fullName,
                        is_paid: false,
                        subscription_status: 'inactive'
                    }, { onConflict: 'id' });

                if (error) {
                    console.error('Profile update error:', error);
                }
            } catch (e) {
                console.error('Profile update failed:', e);
            }
        }

        async function markUserAsPaid(userId) {
            try {
                const { error } = await sb
                    .from('profiles')
                    .update({
                        is_paid: true,
                        subscription_status: 'active',
                        paid_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) {
                    console.error('Mark paid error:', error);
                    return false;
                }
                return true;
            } catch (e) {
                console.error('Mark paid failed:', e);
                return false;
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        function checkStrength() {
            const pwd = document.getElementById('password').value;
            const bars = ['s1', 's2', 's3', 's4'].map(id => document.getElementById(id));
            const lbl = document.getElementById('s-lbl');

            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;

            const cls = ['', 'weak', 'fair', 'strong', 'strong'];
            const lbls = ['', 'WEAK', 'FAIR', 'STRONG', 'MAX'];

            bars.forEach((bar, i) => {
                bar.className = 'str-bar ' + (i < score ? cls[score] : '');
            });
            lbl.textContent = pwd.length ? lbls[score] : '';

            document.getElementById('req-len').className = 'req' + (pwd.length >= 8 ? ' met' : '');
            document.getElementById('req-upper').className = 'req' + (/[A-Z]/.test(pwd) ? ' met' : '');
            document.getElementById('req-num').className = 'req' + (/[0-9]/.test(pwd) ? ' met' : '');
        }

        // ===== SIGNUP HANDLER =====
        async function handleSignup() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const terms = document.getElementById('terms').checked;
            const btn = document.getElementById('signup-btn');

            if (!name || !email || !password || !confirm) {
                showMsg('// ERROR: ALL FIELDS REQUIRED', 'error');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMsg('// ERROR: INVALID EMAIL FORMAT', 'error');
                return;
            }

            if (password.length < 8) {
                showMsg('// ERROR: PASSWORD MUST BE 8+ CHARACTERS', 'error');
                return;
            }

            if (password !== confirm) {
                showMsg('// ERROR: PASSWORDS DO NOT MATCH', 'error');
                return;
            }

            if (!terms) {
                showMsg('// ERROR: ACCEPT TERMS TO CONTINUE', 'error');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;
            document.getElementById('msg').className = 'msg';

            try {
                const { data, error } = await sb.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: name, display_name: name }
                    }
                });

                if (error) {
                    showMsg('// REGISTRATION FAILED: ' + error.message.toUpperCase(), 'error');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    showMsg('// EMAIL ALREADY IN USE — TRY LOGGING IN', 'error');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                if (data.user) {
                    showMsg('// ACCOUNT CREATED — OPENING PAYMENT PORTAL...', 'success');

                    // Create profile record
                    await updateUserProfile(data.user.id, email, name);

                    // Open Paddle checkout
                    paddleCheckoutOpened = true;

                    Paddle.Checkout.open({
                        items: [{ priceId: PADDLE_PRICE_ID, quantity: 1 }],
                        customer: { email },
                        customData: { supabase_user_id: data.user.id, operator_name: name },
                        settings: { displayMode: 'overlay', theme: 'dark' },
                        successCallback: async function (paddleData) {
                            try {
                                const paid = await markUserAsPaid(data.user.id);
                                if (paid) {
                                    showMsg('// PAYMENT CONFIRMED — REDIRECTING TO DASHBOARD...', 'success');
                                    setTimeout(() => {
                                        window.location.href = 'dashboard.html';
                                    }, 1200);
                                } else {
                                    showMsg('// PAYMENT CONFIRMED BUT DATABASE ERROR — CONTACT SUPPORT', 'error');
                                }
                            } catch (e) {
                                console.error('Payment success error:', e);
                                showMsg('// ERROR: COULD NOT COMPLETE REGISTRATION', 'error');
                            }
                        },
                        closeCallback: function () {
                            if (!paddleCheckoutOpened) return;
                            showMsg('// PAYMENT REQUIRED TO ACCESS DASHBOARD', 'error');
                            btn.classList.remove('loading');
                            btn.disabled = false;
                            paddleCheckoutOpened = false;
                        }
                    });

                    // Re-enable button if checkout fails to open
                    setTimeout(() => {
                        if (!paddleCheckoutOpened) {
                            btn.classList.remove('loading');
                            btn.disabled = false;
                        }
                    }, 3000);
                }
            } catch (e) {
                console.error('Signup error:', e);
                showMsg('// ERROR: CONNECTION FAILED', 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ===== INITIALIZATION =====
        (async () => {
            try {
                document.getElementById('sb-status').textContent = 'SUPABASE: CONNECTED';

                // Initialize Paddle
                Paddle.Environment.set('production');
                Paddle.Initialize({
                    token: 'live_b978c685c872729dcde58410fec',
                    eventCallback: async function (event) {
                        if (event.name === 'checkout.completed') {
                            try {
                                const user = await getCurrentUser();
                                if (user) {
                                    const paid = await markUserAsPaid(user.id);
                                    if (paid) {
                                        showMsg('// PAYMENT CONFIRMED — LOADING DASHBOARD...', 'success');
                                        setTimeout(() => {
                                            window.location.href = 'dashboard.html';
                                        }, 1200);
                                    }
                                }
                            } catch (e) {
                                console.error('Paddle event error:', e);
                            }
                        }
                    }
                });
                document.getElementById('paddle-status').textContent = 'PADDLE: READY';

                // Check if already logged in
                await redirectIfAuthenticated();
            } catch (e) {
                console.warn('Init error:', e);
                document.getElementById('sb-status').textContent = 'SUPABASE: ERROR';
                document.getElementById('paddle-status').textContent = 'PADDLE: STANDBY';
            }
        })();

        // Clock update
        setInterval(() => {
            document.getElementById('sb-clock').textContent = new Date().toLocaleTimeString();
        }, 1000);

        // Enter key handler
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSignup();
        });

        // Custom cursor animation
        const cursor = document.getElementById('cursor');
        const cursorRing = document.getElementById('cursor-ring');
        let mouseX = 0, mouseY = 0;
        let ringX = 0, ringY = 0;

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            cursorRing.style.left = ringX + 'px';
            cursorRing.style.top = ringY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>
</body>
