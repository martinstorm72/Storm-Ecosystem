<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Storm OS</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #060606;
            --border: #111111;
            --border2: #1a1a1a;
            --accent: #ffffff;
            --accent2: #d8d8d8;
            --text: #f8f8f8;
            --text2: #aaaaaa;
            --text3: #444444;
            --head: 'Cormorant Garamond', serif;
            --mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @media (pointer: coarse) { body { cursor: auto; } }

        /* Grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanline */
        .scanline {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,.08) 3px,
                rgba(0,0,0,.08) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-family: var(--head);
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 700;
            color: var(--text3);
            letter-spacing: .05em;
            line-height: 1;
            margin-bottom: 0.2em;
            position: relative;
            display: inline-block;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            inset: 0;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,.06);
            transform: translate(3px, 3px);
            z-index: -1;
        }

        .glitch {
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: none; opacity: 1; }
            92% { transform: skewX(-3deg) translateX(-4px); opacity: .8; }
            94% { transform: skewX(3deg) translateX(4px); opacity: .9; }
            96% { transform: skewX(-1deg) translateX(0); opacity: 1; }
        }

        .status-line {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text3);
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .status-line span {
            color: var(--text2);
        }

        h1 {
            font-family: var(--head);
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--accent2);
            letter-spacing: .06em;
            margin-bottom: 0.75rem;
        }

        p {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--text2);
            letter-spacing: .05em;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 11px 24px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            background: var(--card);
            color: var(--text2);
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255,255,255,.06);
            border-color: rgba(255,255,255,.2);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .btn.primary:hover {
            background: var(--accent2);
            border-color: var(--accent2);
            transform: translateY(-2px);
        }

        .divider {
            width: 1px;
            height: 40px;
            background: var(--border2);
            margin: 2rem auto;
        }

        .console-line {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--text3);
            letter-spacing: .08em;
        }

        .console-line .prompt { color: #444; }
        .console-line .cmd { color: var(--text2); }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
    <!-- VERCEL WEB ANALYTICS -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="status-line">STORM OS // <span>SYSTEM ERROR</span> // PAGE NOT FOUND</div>

        <div class="error-code glitch">404</div>

        <h1>Page Not Found</h1>

        <p>
            The page you're looking for doesn't exist<br>
            or has been moved to a different location.
        </p>

        <div class="btn-group">
            <a href="/" class="btn primary">
                ⚡ Back to Home
            </a>
            <a href="/dashboard.html" class="btn">
                → Go to Dashboard
            </a>
        </div>

        <div class="divider"></div>

        <div class="console-line">
            <span class="prompt">storm-os:~$ </span>
            <span class="cmd">navigate --home</span>
            <span class="blink">_</span>
        </div>
    </div>

</body>
</html>
